name: Update Dashboard

on:
  schedule:
    # Runs daily at 8am UTC (4am ET / 1am PT) — after overnight NHL games settle
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Also allows manual trigger from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit index.html back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data and rebuild dashboard
        env:
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
        run: python3 run.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/league_cache.json
          git diff --staged --quiet \
            || git commit -m "chore: update dashboard data [skip ci]"
          git push
